name: CI

on:
  push:
    branches: [main, issue-*]
  pull_request:
    branches: [main]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.6.x"
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: uv sync
        run: uv sync --frozen

      - name: pytest
        run: uv run pytest -q

      - name: Smoke benchmark --help
        run: uv run python scripts/run_smoke_benchmark.py --help
