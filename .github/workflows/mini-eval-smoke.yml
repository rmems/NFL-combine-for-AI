name: Mini Eval Smoke

on:
  pull_request:
    branches: [main]

jobs:
  smoke-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.6.x"
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: uv sync
        run: uv sync --frozen

      - name: Run smoke tests
        run: uv run pytest tests/test_smoke.py -q

      - name: Run smoke benchmark script
        run: uv run python scripts/run_smoke_benchmark.py --output-dir reports/smoke --formats json,csv

      - name: Verify outputs exist
        run: |
          test -d reports/smoke/json
          test -d reports/smoke/csv
          test "$(ls -A reports/smoke/json/*.json)"
          test "$(ls -A reports/smoke/csv/*.csv)"
          echo "PASS: JSON and CSV outputs generated"
